<!DOCTYPE html>
<html lang="hi-Latn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Jarvis · Roman English Voice Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0f1f2b, #030b12);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .jarvis-card {
      width: 100%;
      max-width: 440px;
      background: rgba(16, 30, 42, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px 56px 36px 36px;
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(0, 255, 255, 0.15);
      padding: 28px 20px 30px;
      border: 1px solid rgba(0, 220, 255, 0.2);
      transition: all 0.2s;
    }

    /* header */
    .jarvis-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.15);
    }

    .jarvis-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .jarvis-title h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #b3f0ff, #5fcbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(0, 160, 255, 0.3);
    }

    .status-badge {
      background: #1a3343;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #9ac9e0;
      border: 1px solid #2d5a70;
      white-space: nowrap;
    }

    /* avatar ring */
    .avatar-ring {
      display: flex;
      justify-content: center;
      margin: 6px 0 12px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      background: radial-gradient(circle at 30% 30%, #2a5875, #0d2637);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.25), inset 0 -4px 8px rgba(0,0,0,0.6);
      transition: 0.2s;
      border: 2px solid rgba(0, 255, 255, 0.25);
    }

    .avatar svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 12px #3bb8ff);
    }

    .avatar.listening {
      border-color: #4effd0;
      box-shadow: 0 0 45px #00e0ffaa, inset 0 0 25px #00ccff60;
      animation: pulse-ring 1.2s infinite ease-in-out;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 15px #00e0ff70, inset 0 0 10px #00ccff30; }
      50% { box-shadow: 0 0 50px #00eeffcc, inset 0 0 35px #00ddff80; }
      100% { box-shadow: 0 0 15px #00e0ff70, inset 0 0 10px #00ccff30; }
    }

    /* transcript box */
    .message-box {
      background: #0b1c28dd;
      border-radius: 30px;
      padding: 18px 20px;
      margin: 14px 0 20px;
      border-left: 4px solid #00ccff;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 4px 14px rgba(0,0,0,0.7);
      min-height: 100px;
      display: flex;
      flex-direction: column;
    }

    .message-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8abedb;
      margin-bottom: 8px;
      font-weight: 500;
    }

    #transcript {
      color: #e5f5ff;
      font-size: 1.1rem;
      line-height: 1.5;
      word-break: break-word;
      font-weight: 400;
      flex: 1;
    }

    .empty-transcript {
      color: #5f8299;
      font-style: italic;
      font-weight: 300;
    }

    /* buttons */
    .controls {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 18px;
      margin: 6px 0 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: #1c3547;
      padding: 16px 26px;
      border-radius: 80px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ddf0ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.6), 0 0 0 1px #2a536b;
      transition: 0.12s ease;
      cursor: pointer;
      touch-action: manipulation;
      flex: 1 1 auto;
      min-width: 120px;
      border: 1px solid #2a5a72;
    }

    .btn-primary {
      background: #0077be;
      box-shadow: 0 8px 20px #003f5e, 0 0 0 1px #3bb0ff;
      color: white;
      border-color: #3bb0ff;
    }

    .btn-primary:active {
      transform: scale(0.94);
      background: #0066a8;
    }

    .btn-secondary {
      background: #1d3d52;
      border-color: #3d738b;
    }

    .btn-secondary:active {
      transform: scale(0.94);
      background: #14303f;
    }

    .btn:disabled {
      opacity: 0.45;
      transform: scale(0.97);
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .btn-label {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      font-size: 0.7rem;
      color: #4b7b93;
      letter-spacing: 0.4px;
      border-top: 1px solid #1d3e4f;
      padding-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-note span {
      background: #112a36;
      padding: 4px 14px;
      border-radius: 40px;
      border: 1px solid #1f4b5e;
    }

    @media (max-width: 480px) {
      .jarvis-card { padding: 20px 14px; }
      .btn { padding: 14px 18px; min-width: 100px; }
      .avatar { width: 100px; height: 100px; }
      .avatar svg { width: 58px; height: 58px; }
    }
  </style>
</head>
<body>
  <div class="jarvis-card" role="main">
    <!-- header -->
    <div class="jarvis-header">
      <div class="jarvis-title">
        <h1>JARVIS</h1>
        <span class="status-badge" id="statusBadge">standby</span>
      </div>
    </div>

    <!-- avatar -->
    <div class="avatar-ring">
      <div class="avatar" id="avatarIcon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="44" r="18" fill="#b0e4ff" stroke="#7ac7ff" stroke-width="3" />
          <circle cx="42" cy="40" r="3" fill="#0d2a3b" />
          <circle cx="58" cy="40" r="3" fill="#0d2a3b" />
          <path d="M42 52 Q50 60 58 52" stroke="#0d2a3b" stroke-width="4" stroke-linecap="round" />
          <rect x="44" y="68" width="12" height="20" rx="6" fill="#7ac7ff" opacity="0.6" />
          <circle cx="50" cy="70" r="6" fill="#cceeff" stroke="#0077be" stroke-width="1.5" />
        </svg>
      </div>
    </div>

    <!-- transcript -->
    <div class="message-box">
      <div class="message-label">⏺ response</div>
      <div id="transcript" class="empty-transcript">"Start" dabaye aur Roman English me bolein ...</div>
    </div>

    <!-- controls -->
    <div class="controls">
      <button class="btn btn-primary" id="startBtn" aria-label="Start listening">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="currentColor"/></svg>
        <span class="btn-label">Start</span>
      </button>
      <button class="btn btn-secondary" id="stopBtn" aria-label="Stop listening">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" fill="currentColor" rx="2"/></svg>
        <span class="btn-label">Stop</span>
      </button>
    </div>

    <div class="footer-note">
      <span>🎙️ Roman English</span>
      <span>🇮🇳 Hindi + English</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // DOM refs
      const transcriptEl = document.getElementById('transcript');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusBadge = document.getElementById('statusBadge');
      const avatarIcon = document.getElementById('avatarIcon');

      // speech recognition
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let isListening = false;
      let synthesis = window.speechSynthesis;

      // helpers
      function setStatus(text, isActive = false) {
        statusBadge.textContent = text;
        if (isActive) {
          statusBadge.style.color = '#9effd0';
          statusBadge.style.borderColor = '#5effb0';
        } else {
          statusBadge.style.color = '#9bc9e0';
          statusBadge.style.borderColor = '#2f5a70';
        }
      }

      function updateTranscript(text, isInterim = false) {
        if (isInterim) {
          transcriptEl.innerHTML = text + ' <span style="color:#6fa8c0;font-size:0.9rem;">⋯</span>';
          transcriptEl.classList.remove('empty-transcript');
        } else {
          transcriptEl.textContent = text;
          transcriptEl.classList.remove('empty-transcript');
          if (!text || text.trim() === '') {
            transcriptEl.textContent = '"Start" dabaye aur Roman English me bolein ...';
            transcriptEl.classList.add('empty-transcript');
          }
        }
      }

      // speak response in Roman English (Hindi+English mix)
      function speakResponse(text) {
        if (!synthesis) return;
        synthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';          // Hindi + English roman mix works well
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;

        // try to pick a female Indian voice if available
        const voices = synthesis.getVoices();
        const preferred = voices.find(v => v.lang.startsWith('hi') && v.name.includes('Google') || v.name.includes('Samantha'));
        if (preferred) utterance.voice = preferred;

        utterance.onstart = () => setStatus('speaking', true);
        utterance.onend = () => setStatus('standby', false);
        utterance.onerror = () => setStatus('standby', false);

        synthesis.speak(utterance);
      }

      // --- Roman English command processor (Hindi + English) ---
      function processCommand(transcript) {
        if (!transcript || transcript.trim() === '') return;

        const lower = transcript.toLowerCase().trim();
        let reply = '';

        // Greetings / namaste
        if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') || lower.includes('namaste')) {
          reply = 'Namaste! Main Jarvis hoon. Aap kaise hain?';
        }
        else if (lower.includes('how are you') || lower.includes('kaise ho') || lower.includes('kya haal')) {
          reply = 'Main theek hoon, aapki seva ke liye taiyar.';
        }
        else if (lower.includes('your name') || lower.includes('who are you') || lower.includes('kaun ho')) {
          reply = 'Main Jarvis hoon, aapka voice assistant. Roman English me baat karta hoon.';
        }
        else if (lower.includes('time') || lower.includes('samay') || lower.includes('kya time') || lower.includes('clock')) {
          const now = new Date();
          const h = now.getHours();
          const m = now.getMinutes().toString().padStart(2, '0');
          const ampm = h >= 12 ? 'PM' : 'AM';
          const hr = h % 12 || 12;
          reply = `Time hai ${hr}:${m} ${ampm}.`;
        }
        else if (lower.includes('date') || lower.includes('today') || lower.includes('aaj') || lower.includes('tareekh')) {
          const d = new Date();
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          reply = `Aaj ki date: ${d.toLocaleDateString('en-IN', options)}.`;
        }
        else if (lower.includes('thank') || lower.includes('dhanyawad') || lower.includes('shukriya')) {
          reply = 'Aapka swagat hai! Kuch aur madad chahiye?';
        }
        else if (lower.includes('bye') || lower.includes('goodbye') || lower.includes('alvida') || lower.includes('exit')) {
          reply = 'Alvida! Phir milenge. Have a great day.';
        }
        else if (lower.includes('weather') || lower.includes('mausam')) {
          reply = 'Mausam ke liye main live data nahi laa sakta, lekin aap kisi weather app dekh sakte hain.';
        }
        else if (lower.includes('jarvis') || lower.includes('wake') || lower.includes('sun')) {
          reply = 'Ji, main yahan hoon. Kya aadesh?';
        }
        else if (lower.includes('help') || lower.includes('sahayata') || lower.includes('madad')) {
          reply = 'Main commands samajhta hoon: time, date, namaste, how are you, weather, aur bahut kuch. Roman English me bolein.';
        }
        else {
          // fallback with recognition
          reply = `Aapne kaha: "${transcript}". Main Roman English seekh raha hoon. Kya aap dobara kahenge?`;
        }

        // show and speak
        updateTranscript(`🤖 ${reply}`, false);
        speakResponse(reply);
      }

      // init recognition
      function initRecognition() {
        if (!SpeechRecognition) {
          alert('Ye browser speech recognition support nahi karta. Chrome ya Edge use karein.');
          return false;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';          // Roman English + Hinglish
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
          isListening = true;
          setStatus('sun raha...', true);
          avatarIcon.classList.add('listening');
          startBtn.disabled = true;
          stopBtn.disabled = false;
          updateTranscript('🎤 Sun raha hoon ... Roman English me bolein', false);
        };

        recognition.onresult = function(event) {
          let finalText = '';
          let interimText = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const result = event.results[i];
            if (result.isFinal) {
              finalText += result[0].transcript;
            } else {
              interimText += result[0].transcript;
            }
          }

          if (finalText) {
            updateTranscript(`🗣️ ${finalText}`, false);
            processCommand(finalText);
          } else if (interimText) {
            updateTranscript(`📝 ${interimText}`, true);
          }
        };

        recognition.onerror = function(event) {
          let msg = 'Error: ';
          if (event.error === 'not-allowed') msg += 'Microphone access deny hai.';
          else if (event.error === 'no-speech') msg += 'Koi awaaz nahi mili. Dobara try karein.';
          else msg += event.error;
          updateTranscript(`⚠️ ${msg}`, false);
          setStatus('error', false);
          stopListening();
        };

        recognition.onend = function() {
          if (isListening) {
            setStatus('standby', false);
            avatarIcon.classList.remove('listening');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isListening = false;
            if (transcriptEl.textContent.includes('Sun raha') || transcriptEl.textContent.includes('📝')) {
              updateTranscript('Kuch nahi mila. "Start" dabaye aur bolein.', false);
            }
          } else {
            setStatus('standby', false);
            avatarIcon.classList.remove('listening');
            startBtn.disabled = false;
            stopBtn.disabled = true;
          }
        };

        return true;
      }

      function stopListening() {
        if (recognition && isListening) {
          try { recognition.stop(); } catch (e) {}
        }
        isListening = false;
        avatarIcon.classList.remove('listening');
        setStatus('standby', false);
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      function startListening() {
        if (!recognition) {
          const ok = initRecognition();
          if (!ok) return;
        }
        if (synthesis) synthesis.cancel();

        updateTranscript('🎤 Sun raha hoon ...', false);
        try {
          recognition.start();
        } catch (e) {
          if (e.name === 'InvalidStateError') {
            recognition.stop();
            setTimeout(() => { recognition.start(); }, 200);
          } else {
            alert('Voice input start nahi ho paaya: ' + e.message);
          }
        }
      }

      // events
      startBtn.addEventListener('click', startListening);
      stopBtn.addEventListener('click', stopListening);

      // preload voices
      if (synthesis) {
        synthesis.getVoices();
        synthesis.onvoiceschanged = () => { synthesis.getVoices(); };
      }

      // initial state
      setStatus('standby', false);
      stopBtn.disabled = true;
      updateTranscript('"Start" dabaye aur Roman English me bolein ...', false);

      if (!SpeechRecognition) {
        updateTranscript('⚠️ Speech recognition supported nahi hai.', false);
        startBtn.disabled = true;
      }

      // mobile touch feedback
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('touchstart', () => {}, { passive: true });
      });

    })();
  </script>
</body>
</html>
